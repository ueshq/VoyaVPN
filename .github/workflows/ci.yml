name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_TOOLCHAIN_VERSION: "1.96.0"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CARGO_AUDIT_VERSION: 0.22.2
      CARGO_DENY_VERSION: 0.19.9
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version "$CARGO_DENY_VERSION"

      - name: Run cargo-deny
        run: cargo deny -L error --locked --all-features check advisories bans licenses sources

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version "$CARGO_AUDIT_VERSION"

      - name: Run cargo-audit
        run: cargo audit

      - name: Run pnpm audit
        run: pnpm audit --prod --audit-level high

  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust formatting
        run: pnpm run check:rust:fmt

      - name: Lint Rust
        run: pnpm run check:rust:clippy

      - name: Run Rust tests
        run: pnpm run check:rust:test

      - name: Typecheck frontend
        run: pnpm run check:frontend:typecheck

      - name: Run frontend tests
        run: pnpm run check:frontend:test

      - name: Lint frontend
        run: pnpm run check:frontend:lint

      - name: Check generated IPC binding drift
        run: pnpm run check:bindings

      - name: Check i18n locale drift
        run: pnpm run i18n:check
