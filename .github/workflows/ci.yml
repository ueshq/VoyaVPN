name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust formatting
        run: pnpm run check:rust:fmt

      - name: Run Rust tests
        run: pnpm run check:rust:test

      - name: Typecheck frontend
        run: pnpm run check:frontend:typecheck

      - name: Run frontend tests
        run: pnpm run check:frontend:test

      - name: Lint frontend
        run: pnpm run check:frontend:lint

      - name: Check generated IPC binding drift
        run: pnpm run check:bindings
